seed: 42
device: cuda

data:
  train_path: project/data/processed/train.txt
  val_path: project/data/processed/val.txt
  test_path: project/data/processed/test.txt
  vocab_path: project/data/processed/vocab.json
  sft_path: project/data/processed/sft.jsonl
  qa_path: project/data/processed/qa.jsonl
  sft_val_ratio: 0.08

model:
  block_size: 192
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.15

train:
  pretrain_checkpoint_dir: project/checkpoints/pretrain
  batch_size: 8
  grad_accum_steps: 2
  max_steps: 1500
  early_stop_patience: 8
  eval_interval: 150
  eval_steps: 40
  log_interval: 20
  learning_rate: 0.00008
  weight_decay: 0.05
  grad_clip: 1.0
  warmup_steps: 120
  use_amp: true
  checkpoint_dir: project/checkpoints/sft
  checkpoint_every: 500

generate:
  mode: qa
  qa_instruction: "写出与主题相关的经典论述原句，只输出一句话。"
  first_sentence_only: true
  max_new_tokens: 40
  temperature: 0.5
  top_k: 10
  top_p: 0.82
  repetition_penalty: 1.3
  no_repeat_ngram: 4
